<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluent — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #07070f;
      color: #fff;
      min-height: 100vh;
    }

    .glow {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 48px;
    }

    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: #a78bfa; }

    .logout-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.35);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .logout-btn:hover { color: #fff; }

    .user-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(139, 92, 246, 0.4);
      object-fit: cover;
    }

    .avatar-placeholder {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #a78bfa;
    }

    .user-name { font-size: 22px; font-weight: 700; }
    .user-sub { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 4px; }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 64px 24px;
      text-align: center;
    }

    .card-emoji { font-size: 48px; margin-bottom: 16px; }
    .card-text { font-size: 16px; color: rgba(255,255,255,0.25); }

    /* Loading spinner */
    .spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .spin {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #app { display: none; }
  </style>
</head>
<body>
  <div id="loading" class="spinner"><div class="spin"></div></div>

  <div id="app">
    <div class="glow"></div>
    <div class="container">
      <nav>
        <div class="logo">fluent<span>.</span></div>
        <button class="logout-btn" onclick="logout()" id="logout-label">Log out</button>
      </nav>

      <div class="user-row">
        <div id="avatar-wrap"></div>
        <div>
          <div class="user-name" id="user-name"></div>
          <div class="user-sub" id="user-sub"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-emoji">🇱🇹</div>
        <div class="card-text" id="coming-soon">Lessons coming soon...</div>
      </div>
    </div>
  </div>

  <script>
    const i18n = {
      en: { welcome: 'Welcome back', subtitle: 'Ready to continue your Lithuanian journey?', comingSoon: 'Lessons coming soon...', logout: 'Log out' },
      ru: { welcome: 'С возвращением', subtitle: 'Готов продолжить путь к литовскому?', comingSoon: 'Уроки скоро будут...', logout: 'Выйти' }
    };

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const urlToken = params.get('token');

      if (urlToken) {
        localStorage.setItem('fluent_token', urlToken);
        window.history.replaceState({}, '', '/dashboard');
      }

      const token = urlToken || localStorage.getItem('fluent_token');

      if (!token) {
        window.location.href = '/';
        return;
      }

      try {
        const res = await fetch('/api/auth/me', {
          headers: { Authorization: `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Unauthorized');

        const user = await res.json();
        const lang = localStorage.getItem('lang') || 'en';
        const t = i18n[lang] || i18n.en;

        document.getElementById('user-name').textContent = `${t.welcome}, ${user.name}!`;
        document.getElementById('user-sub').textContent = t.subtitle;
        document.getElementById('coming-soon').textContent = t.comingSoon;
        document.getElementById('logout-label').textContent = t.logout;

        const avatarWrap = document.getElementById('avatar-wrap');
        if (user.picture) {
          avatarWrap.innerHTML = `<img src="${user.picture}" class="avatar" alt="${user.name}" />`;
        } else {
          avatarWrap.innerHTML = `<div class="avatar-placeholder">${user.name[0]}</div>`;
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
      } catch {
        localStorage.removeItem('fluent_token');
        window.location.href = '/';
      }
    }

    function logout() {
      localStorage.removeItem('fluent_token');
      window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
