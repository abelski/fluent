services:
  - type: web
    name: fluent-backend
    runtime: python
    pythonVersion: "3.12.9"
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt && python seed.py
    startCommand: bash -c "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
