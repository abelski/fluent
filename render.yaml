services:
  - type: web
    name: fluent-backend
    runtime: python
    pythonVersion: "3.12.9"
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && pip install -r api/requirements.txt && (cd api && python ../scripts/seed.py)
    startCommand: bash -c "cd api && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
